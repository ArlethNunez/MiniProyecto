<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Inicio de sesión</title>
</head>
<body>
    <header class="site-header">
        <div class="container header-content">
            <h1 class="logo">Pasantías<span class="logo-accent">CR</span></h1>
            <a href="index.html" class="btn-secondary">← Volver al inicio</a>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-container">
            <h1>Iniciar Sesión</h1>

            <form id="formLogin">
                <input type="email" id="correo" placeholder="Correo electrónico" required>
                <input type="password" id="contrasena" placeholder="Contraseña" required>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>

            <p id="mensajeError" style="color: red; display: none;">Correo o contraseña incorrectos.</p>
            <p>¿No tenés cuenta? <a href="registro.html">Registrate aquí</a></p>
        </div>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
